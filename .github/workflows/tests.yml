# Workflow para rodar automaticamente os testes.
# Execução feita para cada push/pull request.
# Configura o ambiente, instala dependências e executa pytest.

name: Test Automation

# Permissão de escrita do workflow.
permissions:
  contents: write

# Gatilhos
on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest #  Criar máquina virtual para execução.

    # Adicionando Postgres no Workflow.
    services:
      postgres:
        image: postgres 15
        env:
          POSTGRES_DB: qa_db
          POSTGRES_PASSWORD: qa_pass
          POSTGRES_USER: qa_user
        ports:
          - 5432:5432
       # Verificação de resposta.
        options: >-
          --health-cmd="pg_isready -U qa_user" 
          --health-interval=10s
          --health-timeou=5s
          --health-retries=5


    env:
      API_KEY: ${{ secrets.API_KEY }} 
      HEADLESS: true  # Cria variavél para "env." garantindo segurança.
    
    # Clonar código ná maquina.
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # Configurar versão do python
      - name:  Configurar python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # Instalar dependências do requerements.txt.
      - name: Instalar dependências
        run: |
          pip install -r requirements.txt

      # Instalar Playwright para os testes de interface.
      - name: Instalar Playwright + browsers
        run: |
          pip install playwright
          playwright install --with-deps

      # Rodar a execução dos testes e criando diretório para allure.
      - name: Rodar testes com Allure
        run: |
          pytest --alluredir=allure-results

      # Instalar o allure para a visualização de dados.
      - name: Instalar Allure
        run: |
          sudo apt-get update
          npm install -g allure-commandline --save-dev
      
      # Gerar relatório
      - name: Gerar relatório Allure
        run: |
          allure generate allure-results --clean -o allure-report


      # Deploy Allure Report no GitHub Pages
      - name: Enviar Allure Report para GitHub pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          force_orphan: true

      # Baixar reletório e colocar em Artifacts
      - name: Upload Allure Report
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
  
